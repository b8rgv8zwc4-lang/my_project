{% extends "sights/layout.html" %}



{%block title%}
    Интерактивная карта маршрутов по континентам
{%endblock%}

{%block body%}

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-sA+e2q7r8nKk0jz0gq6fYFQe3z3Kk2Y1bY+q3u1wM4M=" crossorigin="" />
  <style>
    body, html { height: 100%; margin: 0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; }
    #map { height: 100vh; width: 100%; }
    .legend { background: white; padding: 8px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.15); }
    .leaflet-tooltip.my-tooltip { background: rgba(255,255,255,0.95); color: #111; border-radius: 4px; padding: 4px 6px; font-weight: 600; }
  </style>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-o9N1j7w2qYg1g2Xk2aYw+Yg1Kp3zj3Y1a1w9m1yM6j8=" crossorigin=""></script>
  <script>
    // Инициализация карты
    const map = L.map('map', { zoomControl: true }).setView([20, 0], 2);

    // Базовый слой (OpenStreetMap)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // Общие опции для линии маршрута
    function styleFor(continent) {
      const colors = {
        Europe: '#1f78b4',
        Africa: '#33a02c',
        Asia: '#e31a1c',
        'North America': '#ff7f00',
        'South America': '#6a3d9a',
        Oceania: '#b15928'
      };
      return {
        color: colors[continent] || '#000',
        weight: 4,
        opacity: 0.85,
        lineJoin: 'round'
      };
    }

    // Примеры маршрутов для каждого континента (GeoJSON LineString).
    // Замените координаты на свои, если нужно.
    const routesGeoJSON = {
      "type": "FeatureCollection",
      "features": [
        // Европа: Лондон -> Париж -> Рим
        {
          "type": "Feature",
          "properties": { "continent": "Europe", "name": "Лондон — Париж — Рим" },
          "geometry": { "type": "LineString", "coordinates": [
            [-0.1278, 51.5074], // London
            [2.3522, 48.8566],  // Paris
            [12.4964, 41.9028]  // Rome
          ] }
        },

        // Африка: Каир -> Аддис-Абеба -> Кейптаун
        {
          "type": "Feature",
          "properties": { "continent": "Africa", "name": "Каир — Аддис-Абеба — Кейптаун" },
          "geometry": { "type": "LineString", "coordinates": [
            [31.2357, 30.0444], // Cairo
            [38.7578, 9.0084],  // Addis Ababa
            [18.4241, -33.9249] // Cape Town
          ] }
        },

        // Азия: Пекин -> Дели -> Бангкок
        {
          "type": "Feature",
          "properties": { "continent": "Asia", "name": "Пекин — Дели — Бангкок" },
          "geometry": { "type": "LineString", "coordinates": [
            [116.4074, 39.9042], // Beijing
            [77.1025, 28.7041],  // Delhi
            [100.5018, 13.7563]  // Bangkok
          ] }
        },

        // Северная Америка: Нью-Йорк -> Вашингтон -> Лос-Анджелес
        {
          "type": "Feature",
          "properties": { "continent": "North America", "name": "Нью-Йорк — Вашингтон — Лос-Анджелес" },
          "geometry": { "type": "LineString", "coordinates": [
            [-74.0060, 40.7128], // New York
            [-77.0369, 38.9072], // Washington DC
            [-118.2437, 34.0522] // Los Angeles
          ] }
        },

        // Южная Америка: Богота -> Кито -> Лима
        {
          "type": "Feature",
          "properties": { "continent": "South America", "name": "Богота — Кито — Лима" },
          "geometry": { "type": "LineString", "coordinates": [
            [-74.0721, 4.7110],   // Bogota
            [-78.4678, -0.1807],  // Quito
            [-77.0428, -12.0464]  // Lima
          ] }
        },

        // Океания: Сидней -> Окленд -> Веллингтон
        {
          "type": "Feature",
          "properties": { "continent": "Oceania", "name": "Сидней — Окленд — Веллингтон" },
          "geometry": { "type": "LineString", "coordinates": [
            [151.2093, -33.8688], // Sydney
            [174.7633, -36.8485], // Auckland
            [174.7762, -41.2865]  // Wellington
          ] }
        }
      ]
    };

    // Слои по континентам (чтобы можно было включать/выключать)
    const continentLayers = {};

    L.geoJSON(routesGeoJSON, {
      style: function(feature) {
        return styleFor(feature.properties.continent);
      },
      onEachFeature: function(feature, layer) {
        // При наведении: показать тултип (название маршрута: от — до)
        const name = feature.properties.name || 'Маршрут';
        // Привязываем tooltip, показываем при наведении
        layer.bindTooltip(name, { className: 'my-tooltip', sticky: true, direction: 'center' });

        // Дополнительно: всплывающее окно при клике с подробностями
        layer.on('click', function(e) {
          const coords = feature.geometry.coordinates;
          const from = coords[0];
          const to = coords[coords.length - 1];
          const html = `<b>${name}</b><br>От: ${from[1].toFixed(4)}, ${from[0].toFixed(4)}<br>До: ${to[1].toFixed(4)}, ${to[0].toFixed(4)}`;
          L.popup({ maxWidth: 320 }).setLatLng(e.latlng).setContent(html).openOn(map);
        });

        // Добавляем маршрут в слой континента (для управления)
        const cont = feature.properties.continent || 'Other';
        if (!continentLayers[cont]) continentLayers[cont] = L.layerGroup();
        continentLayers[cont].addLayer(layer);
      }
    });

    // Добавляем каждый слой на карту и формируем контрол
    const overlays = {};
    Object.keys(continentLayers).forEach(cont => {
      continentLayers[cont].addTo(map);
      overlays[cont] = continentLayers[cont];
    });

    L.control.layers(null, overlays, { collapsed: false, position: 'topright' }).addTo(map);

    // Легенда (упрощённая)
    const legend = L.control({ position: 'bottomright' });
    legend.onAdd = function () {
      const div = L.DomUtil.create('div', 'legend');
      div.innerHTML = '<strong>Маршруты по континентам</strong><br>' +
        '<div style="margin-top:6px">■ Европа — Лондон/Париж/Рим</div>' +
        '<div>■ Африка — Каир/Аддис-Абеба/Кейптаун</div>' +
        '<div>■ Азия — Пекин/Дели/Бангкок</div>' +
        '<div>■ Северная Америка — Нью-Йорк/Вашингтон/Лос-Анджелес</div>' +
        '<div>■ Южная Америка — Богота/Кито/Лима</div>' +
        '<div>■ Океания — Сидней/Окленд/Веллингтон</div>';
      return div;
    };
    legend.addTo(map);

    // Удобная функция: центрировать на заданном континенте
    function centerOn(continent) {
      const layer = continentLayers[continent];
      if (!layer) return;
      // Получим границы всех маршрутов слоя и установим вид
      const groupBounds = layer.getBounds();
      if (groupBounds.isValid()) map.fitBounds(groupBounds.pad(1.2));
    }

    // Экспорт: для использования из других скриптов
    window.routesMap = {
      map,
      continentLayers,
      centerOn
    };
  </script>
</body>
</html>

{%endblock%}
